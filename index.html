<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Queue</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      font-size: 72px;
      font-weight: bold;
      text-transform: uppercase;
      line-height: 1.4;

      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* lista pegada arriba */
      align-items: flex-start;

      padding: 20px;
      min-height: 1200px; /* 👈 alarga hacia abajo */
      box-sizing: border-box;
    }

    #list {
      width: 100%;
    }

    .row {
      margin: 12px 0;
    }
  </style>
</head>

<body>
  <div id="list"></div>

  <script>
    const REFRESH_MS = 1000;

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function refresh() {
      try {
        const res = await fetch("queue.txt?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error();

        const txt = await res.text();
        const lines = txt
          .split(/\r?\n/)
          .map(x => x.trim())
          .filter(Boolean);

        document.getElementById("list").innerHTML =
          lines.map(l => `<div class="row">${escapeHtml(l)}</div>`).join("");

      } catch (e) {
        document.getElementById("list").innerHTML = "";
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
